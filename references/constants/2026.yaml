    value: 19242
    unit: "RUB/month"
    source: "ФЗ-589 от 27.11.2025"
    source_date: "2025-11-27"
    note: "МРОТ январь 2026. Применяется для расчёта зарплаты, больничных, страх.взносов"

  max_unemployment_benefit:
