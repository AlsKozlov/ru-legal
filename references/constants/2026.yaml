# Российское законодательство — константы на 2026 год
#
# Этот файл — single source of truth для всех hardcoded values в skills.
# Skills НЕ должны хардкодить эти числа в тексте — должны ссылаться на этот файл
# (либо через constants.get(...) tool из constants-mcp).
#
# Обновляется ежемесячно или при изменении законодательства.
# Каждое значение сопровождается source + source_date для аудита.

metadata:
  year: 2026
  last_updated: "2026-05-26"
  maintainer: "@AlsKozlov"
  next_review: "2026-06-26"

